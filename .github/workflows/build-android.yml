name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Java 17 (required by Gradle / Android build tools) ────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── 4. Android SDK ───────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      # ── 5. Install npm dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 6. Expo prebuild → generates native Android project ─────────────────
      - name: Prebuild Expo (generate Android project)
        run: npx expo prebuild --platform android --non-interactive --clean
        env:
          EXPO_NO_DOTENV: 1

      # ── 7. Make gradlew executable ───────────────────────────────────────────
      - name: Set Gradle permissions
        run: chmod +x android/gradlew

      # ── 8. Cache Gradle ──────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 9. Build debug APK ───────────────────────────────────────────────────
      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      # ── 10. Upload APK artifact ──────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vericash-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 11. Create GitHub Release on tag push ────────────────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: VeriCash ${{ github.ref_name }}
          body: |
            ## VeriCash Android APK

            Scan banknotes with the VeriCash field inspector app.

            **Download** `app-debug.apk` from Assets below and install on your device.
            Enable "Install from unknown sources" in Android settings first.

            This APK connects to the VeriCash backend (default: `http://10.0.2.2:8001` for Android emulator).
            Change the API URL in Settings if connecting to a remote server.
