<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#162e51"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1a4480" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1a4480" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1a4480" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1a4480" stroke-width="1"/>

  <!-- Gold accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#ffbc78"/>

  <!-- Seal circle -->
  <circle cx="960" cy="315" r="200" fill="none" stroke="#ffbc78" stroke-width="2" opacity="0.3"/>
  <circle cx="960" cy="315" r="160" fill="none" stroke="#ffbc78" stroke-width="1" opacity="0.2"/>
  <polygon points="960,155 975,205 1025,205 985,235 1000,285 960,255 920,285 935,235 895,205 945,205" fill="#ffbc78" opacity="0.25"/>

  <!-- Logo mark -->
  <circle cx="90" cy="90" r="36" fill="#ffbc78"/>
  <polygon points="90,62 95,79 113,79 99,88 104,106 90,97 76,106 81,88 67,79 85,79" fill="#162e51"/>

  <!-- App name -->
  <text x="140" y="80" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="-1">VeriCash</text>
  <text x="140" y="110" font-family="Arial, sans-serif" font-size="16" fill="#8a96b2" letter-spacing="2" text-transform="uppercase">OFFICE OF CURRENCY AUTHENTICATION</text>

  <!-- Divider -->
  <line x1="90" y1="145" x2="720" y2="145" stroke="#1a4480" stroke-width="1.5"/>

  <!-- Main headline -->
  <text x="90" y="260" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-2">Fake Currency</text>
  <text x="90" y="345" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#ffbc78" letter-spacing="-2">Detection</text>

  <!-- Description -->
  <text x="90" y="415" font-family="Arial, sans-serif" font-size="26" fill="#c5cee0">Scan any banknote · Get instant verdict</text>
  <text x="90" y="450" font-family="Arial, sans-serif" font-size="26" fill="#c5cee0">7 image-processing techniques · CIE Lab fingerprints</text>

  <!-- Tags -->
  <rect x="90" y="500" width="140" height="40" rx="20" fill="none" stroke="#ffbc78" stroke-width="1.5"/>
  <text x="160" y="525" font-family="Arial, sans-serif" font-size="16" fill="#ffbc78" text-anchor="middle">INR · USD · EUR</text>

  <rect x="250" y="500" width="130" height="40" rx="20" fill="none" stroke="#8a96b2" stroke-width="1.5"/>
  <text x="315" y="525" font-family="Arial, sans-serif" font-size="16" fill="#8a96b2" text-anchor="middle">FastAPI + Next.js</text>

  <!-- URL -->
  <text x="90" y="600" font-family="Arial, sans-serif" font-size="20" fill="#4a7fbf" letter-spacing="0.5">vericash.duckdns.org</text>
</svg>
